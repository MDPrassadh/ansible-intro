---
- name: Ensure users exist with passwords
  hosts: web
  become: yes

  vars:
    ec2_users:
      - { name: "expense", password: "expense" }
      - { name: "durga",   password: "durga" }
      - { name: "devops",  password: "devops" }

  tasks:
    - name: Ensure users exist
      ansible.builtin.user:
        name: "{{ item.name }}"
        state: present
        password: "{{ item.password }}"
      loop: "{{ ec2_users }}"
      register: user_results

    - name: Show which users were created or already existed
      ansible.builtin.debug:
        msg: >
          {% for result in user_results.results %}
            {% if result.changed %}
              User '{{ result.item.name }}' was created with a password.
            {% else %}
              User '{{ result.item.name }}' already existed.
            {% endif %}
          {% endfor %}
