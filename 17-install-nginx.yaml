- name: install nginx
  become: yes
  hosts: web
  tasks:
  - name: print the stats
    ansible.builtin.debug:
      msg: "{{ ansible_facts }}"
  
  - name: install nginx if redhat
    ansible.builtin.dnf:
      name: nginx
      state: present
    when: ansible_os_family == "RedHat"

  - name: Start and enable nginx service
    ansible.builtin.service:
      name: nginx
      state: started
      enabled: yes

  - name: Create a simple index.html
    ansible.builtin.copy:
      dest: /usr/share/nginx/html/index.html
      content: "<html><body><h1>Welcome to nginx from RHEL! MDP </h1></body></html>"

  - name: install nginx if Debian
    ansible.builtin.apt:
      name: nginx
      state: present
    when: ansible_os_family == "Debian"  # ansible_os_family is fetch from ansible_facts