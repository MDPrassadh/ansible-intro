---
- name: Install MariaDB server on RHEL
  hosts: web
  become: yes
  tasks:
    - name: Install MariaDB server
      ansible.builtin.yum:
        name: mariadb-server
        state: present

    - name: Start and enable MariaDB
      ansible.builtin.service:
        name: mariadb
        state: started
        enabled: yes

- name: Install other packages
  hosts: web
  become: yes
  tasks:
    - name: Install/remove packages with loop
      ansible.builtin.package:
        name: "{{ item.name }}"
        state: "{{ item.state }}"
      loop:
        - { name: 'nginx', state: 'absent' }
        - { name: 'postfix', state: 'absent' }
        - { name: 'nginx', state: 'present' }


