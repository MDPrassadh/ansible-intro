- name: Create EC2 and Route53 records
  hosts: local
  connection: local
  collections:
    - amazon.aws

  vars:
    vpc_id: "vpc-05170b8abe4d7792b"
    subnet_frontend: "subnet-01b784284299163e3"
    subnet_backend: "subnet-06d34df27c64605ce"
    subnet_mysql: "subnet-08bb5b99a75588b1c"
    subnet_bastion: "subnet-0fff9fc599d24bc7c"

    sg_frontend: "sg-0434875cae6b609aa"
    sg_backend: "sg-076f74fdfe5212b57"
    sg_mysql: "sg-01fd2949b734db2ef"
    sg_bastion: "sg-037622c94cb515d37"

    ami_id: "ami-09e973f123c32cf86"
    region: "us-east-1"
    zone: "jioairlines.online"
    key_name: "nv-ansible"

    # Explicit zone IDs
    public_zone_id: "Z03935303DMMJM97SI3N5"
    private_zone_id: "Z0431543MIZJIID5SGPG"

    instances:
      - mysql
      - backend
      - frontend
      - bastion

  tasks:
    - name: Launch EC2 instances
      amazon.aws.ec2_instance:
        name: "{{ item }}"
        instance_type: "t3.micro"
        image_id: "{{ ami_id }}"
        region: "{{ region }}"
        key_name: "{{ key_name }}"
        vpc_subnet_id: "{{ subnet_frontend if item == 'frontend' else (subnet_backend if item == 'backend' else (subnet_mysql if item == 'mysql' else subnet_bastion)) }}"
        security_groups: "{{ [sg_frontend] if item == 'frontend' else ([sg_backend] if item == 'backend' else ([sg_mysql] if item == 'mysql' else [sg_bastion])) }}"
      loop: "{{ instances }}"
      register: ec2_instances

    - name: Set facts for IPs
      ansible.builtin.set_fact:
        frontend_public_ip: "{{ (ec2_instances.results | selectattr('item','equalto','frontend') | map(attribute='instances') | first)[0].public_ip_address }}"
        backend_private_ip: "{{ (ec2_instances.results | selectattr('item','equalto','backend') | map(attribute='instances') | first)[0].private_ip_address }}"
        mysql_private_ip: "{{ (ec2_instances.results | selectattr('item','equalto','mysql') | map(attribute='instances') | first)[0].private_ip_address }}"
        bastion_public_ip: "{{ (ec2_instances.results | selectattr('item','equalto','bastion') | map(attribute='instances') | first)[0].public_ip_address }}"

    # Public zone records (frontend + bastion)
    - name: Create Route53 records in public zone
      amazon.aws.route53:
        state: present
        hosted_zone_id: "{{ public_zone_id }}"   # Correct param
        record: "{{ item.name }}"
        type: A
        ttl: 60
        value: "{{ item.value }}"
        overwrite: true
      loop:
        - { name: "{{ zone }}", value: "{{ frontend_public_ip }}" }
        - { name: "frontend.{{ zone }}", value: "{{ frontend_public_ip }}" }
        - { name: "bastion.{{ zone }}", value: "{{ bastion_public_ip }}" }

    # Private zone records (backend + mysql)
    - name: Create Route53 records in private zone
      amazon.aws.route53:
        state: present
        hosted_zone_id: "{{ private_zone_id }}"   # Correct param
        record: "{{ item.name }}"
        type: A
        ttl: 60
        value: "{{ item.value }}"
        overwrite: true
      loop:
        - { name: "backend.{{ zone }}", value: "{{ backend_private_ip }}" }
        - { name: "mysql.{{ zone }}", value: "{{ mysql_private_ip }}" }



















