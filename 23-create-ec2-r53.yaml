---
- name: Create EC2 and Route53 records
  hosts: local
  connection: local
  become: false
  collections:
    - amazon.aws

  vars:
    subnet_id: "subnet-0180bc868530ad0b1"
    sg_id: "sg-02a5e0c53ec4cd644"
    ami_id: "ami-09e973f123c32cf86"
    region: "us-east-1"
    zone: "jioairlines.online"
    key_name: "ansible.pem"
    instances:
    - mysql
    - backend
    - frontend
     

       # keep subnet_id, sg_id, ami_id, zone, etc. here

  tasks:
    - name: Install boto3 and botocore
      ansible.builtin.pip:
        name:
          - boto3
          - botocore
        executable: pip3.9

    - name: Launch EC2 instances
      amazon.aws.ec2_instance:
        name: "{{ item }}"
        vpc_subnet_id: "{{ subnet_id }}"
        instance_type: "t3.micro"
        security_group: "{{ sg_id }}"
        image_id: "{{ ami_id }}"
        
        region: "{{ region }}"
      loop: "{{ instances }}"
      register: ec2_instances

    - name: Print EC2 output
      ansible.builtin.debug:
        msg: "{{ ec2_instances }}"

    - name: Create private Route53 records
      amazon.aws.route53:
        state: present
        zone: "{{ zone }}"
        record: "{{ item.item }}.{{ zone }}"
        type: A
        ttl: 60
        value: "{{ item.instances[0].private_ip_address }}"
        wait: true
        overwrite: true
      loop: "{{ ec2_instances.results }}"

    - name: Create public Route53 record for frontend
      amazon.aws.route53:
        state: present
        zone: "{{ zone }}"
        record: "{{ zone }}"
        type: A
        ttl: 60
        value: "{{ item.instances[0].public_ip_address }}"
        wait: true
        overwrite: true
      loop: "{{ ec2_instances.results }}"
      when: item.item == "frontend"

- name: Configure MySQL on mysql instance
  hosts: mysql
  become: true
  tasks:
    - name: Update apt cache
      ansible.builtin.package:
        update_cache: yes

    - name: Install MySQL server
      ansible.builtin.package:
        name: mysql-server
        state: present

    - name: Ensure MySQL service is running
      ansible.builtin.service:
        name: mysql
        state: started
        enabled: true



