---
- name: Destroy entire JioAirlines infra
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - amazon.aws

  vars:
    region: us-east-1
    zone: jioairlines.online

    instance_names:
      - mysql
      - backend
      - frontend
      - bastion

  tasks:

    # -------------------------------
    # 1. Get EC2 instances
    # -------------------------------
    - name: Fetch EC2 instances
      amazon.aws.ec2_instance_info:
        region: "{{ region }}"
        filters:
          "tag:Name": "{{ item }}"
      loop: "{{ instance_names }}"
      register: ec2_info

    # -------------------------------
    # 2. Extract instance IDs safely
    # -------------------------------
    - name: Build instance ID list
      set_fact:
        instance_ids: >-
          {{ instance_ids | default([]) + 
             (item.instances | map(attribute='instance_id') | list) }}
      loop: "{{ ec2_info.results }}"
      when: item.instances | length > 0

    # -------------------------------
    # 3. Debug (optional but smart)
    # -------------------------------
    - name: Show instances to delete
      debug:
        var: instance_ids

    # -------------------------------
    # 4. Terminate EC2
    # -------------------------------
    - name: Terminate EC2 instances
      amazon.aws.ec2_instance:
        instance_ids: "{{ instance_ids }}"
        state: absent
        region: "{{ region }}"
        wait: true
      when: instance_ids is defined and instance_ids | length > 0

    # -------------------------------
    # 5. Delete Route53 records
    # -------------------------------
    - name: Delete Route53 records
      amazon.aws.route53:
        state: absent
        zone: "{{ zone }}"
        record: "{{ item }}.{{ zone }}"
        type: A
      loop:
        - mysql
        - backend
        - frontend
        - bastion