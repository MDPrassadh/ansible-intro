- name: Expense Tracker VPC Setup
  hosts: local
  connection: local
  collections:
    - amazon.aws
  vars:
    region: "ap-south-1"
    vpc_cidr: "10.0.0.0/16"
    vpc_name: "expense-tracker-vpc"

  tasks:
    - name: Create VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ vpc_name }}"
        cidr_block: "{{ vpc_cidr }}"
        region: "{{ region }}"
        dns_support: true
        dns_hostnames: true
        state: present
      register: vpc

    - name: Create Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        state: present
      register: igw

    # --- Subnets across AZs ---
    - name: Create frontend subnet 1a
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.1.0/24"
        az: "us-east-1a"
        map_public: true
        tags: { Name: "frontend-subnet-1a" }
      register: frontend_subnet_1a

    - name: Create frontend subnet 1b
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.2.0/24"
        az: "us-east-1b"
        map_public: true
        tags: { Name: "frontend-subnet-1b" }
      register: frontend_subnet_1b

    - name: Create backend subnet 1a
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.11.0/24"
        az: "us-east-1a"
        tags: { Name: "backend-subnet-1a" }
      register: backend_subnet_1a

    - name: Create backend subnet 1b
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.12.0/24"
        az: "us-east-1b"
        tags: { Name: "backend-subnet-1b" }
      register: backend_subnet_1b

    - name: Create db subnet 1a
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.21.0/24"
        az: "us-east-1a"
        tags: { Name: "db-subnet-1a" }
      register: db_subnet_1a

    - name: Create db subnet 1b
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.22.0/24"
        az: "us-east-1b"
        tags: { Name: "db-subnet-1b" }
      register: db_subnet_1b

    # --- Route Tables + NAT ---
    - name: Create Public RT
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        tags: { Name: "public-rt" }
      register: public_rt

    - name: Add IGW route
      amazon.aws.ec2_vpc_route_table:
        route_table_id: "{{ public_rt.route_table.id }}"
        region: "{{ region }}"
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw.gateway_id }}"

    - name: Associate public subnets
      amazon.aws.ec2_vpc_route_table_association:
        subnet_id: "{{ item.subnet.id }}"
        route_table_id: "{{ public_rt.route_table.id }}"
      loop:
        - "{{ frontend_subnet_1a }}"
        - "{{ frontend_subnet_1b }}"

    - name: Allocate Elastic IP for NAT
      amazon.aws.ec2_eip:
        region: "{{ region }}"
        state: present
      register: eip

    - name: Create NAT Gateway
      amazon.aws.ec2_vpc_nat_gateway:
        subnet_id: "{{ frontend_subnet_1a.subnet.id }}"
        region: "{{ region }}"
        state: present
        wait: true
        allocation_id: "{{ eip.allocation_id }}"
      register: nat_gw

    - name: Create Private RT
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        tags: { Name: "private-rt" }
      register: private_rt

    - name: Add NAT route
      amazon.aws.ec2_vpc_route_table:
        route_table_id: "{{ private_rt.route_table.id }}"
        region: "{{ region }}"
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ nat_gw.nat_gateway_id }}"

    - name: Associate private subnets
      amazon.aws.ec2_vpc_route_table_association:
        subnet_id: "{{ item.subnet.id }}"
        route_table_id: "{{ private_rt.route_table.id }}"
      loop:
        - "{{ backend_subnet_1a }}"
        - "{{ backend_subnet_1b }}"
        - "{{ db_subnet_1a }}"
        - "{{ db_subnet_1b }}"
