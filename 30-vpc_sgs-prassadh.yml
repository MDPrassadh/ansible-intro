- name: Create VPC, Subnets, IGW, NAT, and SGs
  hosts: local
  connection: local
  collections:
    - amazon.aws

  vars:
    region: "ap-south-1"
    vpc_name: "prassadh-ap-1-vpc"
    cidr_block: "10.0.0.0/16"
    my_ip: "203.0.113.25/32"   # <-- Replace with YOUR actual public IPv4 address

  tasks:
    # VPC
    - name: Create VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ vpc_name }}"
        cidr_block: "{{ cidr_block }}"
        region: "{{ region }}"
        dns_support: true
        dns_hostnames: true
        state: present
      register: vpc

    # Subnets AZ 1a
    - name: Public Subnet 1a
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.1.0/24"
        az: "ap-south-1a"
        map_public: true
        region: "{{ region }}"
        tags: { Name: "prassadh-public-subnet-1a" }
      register: subnet_public_1a

    - name: Private Subnet 1a
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.11.0/24"
        az: "ap-south-1a"
        region: "{{ region }}"
        tags: { Name: "prassadh-private-subnet-1a" }
      register: subnet_private_1a

    - name: Database Subnet 1a
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.21.0/24"
        az: "ap-south-1a"
        region: "{{ region }}"
        tags: { Name: "prassadh-database-subnet-1a" }
      register: subnet_db_1a

    # Subnets AZ 1b
    - name: Public Subnet 1b
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.2.0/24"
        az: "ap-south-1b"
        map_public: true
        region: "{{ region }}"
        tags: { Name: "prassadh-public-subnet-1b" }
      register: subnet_public_1b

    - name: Private Subnet 1b
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.12.0/24"
        az: "ap-south-1b"
        region: "{{ region }}"
        tags: { Name: "prassadh-private-subnet-1b" }
      register: subnet_private_1b

    - name: Database Subnet 1b
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.22.0/24"
        az: "ap-south-1b"
        region: "{{ region }}"
        tags: { Name: "prassadh-database-subnet-1b" }
      register: subnet_db_1b

    # IGW
    - name: Create Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        state: present
      register: igw

    # Allocate Elastic IP for NAT
    # Allocate Elastic IP for NAT Gateway (idempotent)
    - name: Ensure Elastic IP for NAT Gateway exists
      amazon.aws.ec2_eip:
        region: "{{ region }}"
        state: present
      # Give it a tag so we can find it later
        tags:
          Name: "prassadh-nat-eip"
      register: nat_eip


    # NAT Gateway (example in public-1a)
    - name: Create NAT Gateway
      amazon.aws.ec2_vpc_nat_gateway:
        subnet_id: "{{ subnet_public_1a.subnet.id }}"
        region: "{{ region }}"
        allocation_id: "{{ nat_eip.allocation_id }}"
        state: present
        wait: true
      register: natgw
    
    # Public Route Table with subnets
    - name: Create Public Route Table and associate subnets
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        state: present
        tags: { Name: "prassadh-public-rt" }
        routes:
          - dest: "0.0.0.0/0"
            gateway_id: "{{ igw.gateway_id }}"
        subnets:
          - "{{ subnet_public_1a.subnet.id }}"
          - "{{ subnet_public_1b.subnet.id }}"
      register: public_rt

    # Private Route Table with subnets
    - name: Create Private Route Table and associate subnets
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        state: present
        tags: { Name: "prassadh-private-rt" }
        routes:
          - dest: "0.0.0.0/0"
            nat_gateway_id: "{{ natgw.nat_gateway_id }}"
        subnets:
          - "{{ subnet_private_1a.subnet.id }}"
          - "{{ subnet_private_1b.subnet.id }}"
      register: private_rt

    # Database Route Table with subnets
    - name: Create Database Route Table and associate subnets
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        state: present
        tags: { Name: "prassadh-db-rt" }
        subnets:
          - "{{ subnet_db_1a.subnet.id }}"
          - "{{ subnet_db_1b.subnet.id }}"
      register: db_rt

    # Security Groups
    - name: Bastion SG
      amazon.aws.ec2_group:
        name: prassadh-bastion
        description: Bastion SG
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: 22
            cidr_ip: "{{ my_ip }}"
        rules_egress:
          - proto: -1
            cidr_ip: "0.0.0.0/0"

    - name: Frontend SG
      amazon.aws.ec2_group:
        name: prassadh-frontend
        description: Frontend SG
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: [80, 443]
            cidr_ip: "0.0.0.0/0"
          - proto: tcp
            ports: 22
            group_name: prassadh-bastion
        rules_egress:
          - proto: -1
            cidr_ip: "0.0.0.0/0"

    - name: Backend SG
      amazon.aws.ec2_group:
        name: prassadh-backend
        description: Backend SG
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: 8080
            group_name: prassadh-frontend
          - proto: tcp
            ports: 22
            group_name: prassadh-bastion
        rules_egress:
          - proto: -1
            cidr_ip: "0.0.0.0/0"

    - name: Database SG
      amazon.aws.ec2_group:
        name: prassadh-database
        description: Database SG
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: 3306
            group_name: prassadh-backend
          - proto: tcp
            ports: 22
            group_name: prassadh-bastion
        rules_egress:
          - proto: -1
            cidr_ip: "0.0.0.0/0"


