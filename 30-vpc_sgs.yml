- name: Create VPC, Subnets, IGW, NAT, and SGs
  hosts: localhost
  connection: local
  collections:
    - amazon.aws

  vars:
    region: "ap-south-1"
    vpc_name: "prassadh"
    cidr_block: "10.0.0.0/16"

  tasks:
    - name: Create VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ vpc_name }}"
        cidr_block: "{{ cidr_block }}"
        region: "{{ region }}"
        dns_support: true
        dns_hostnames: true
        state: present
      register: vpc

    # Subnets AZ 1a
    - name: Public Subnet 1a
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.1.0/24"
        az: "ap-south-1a"
        map_public: true
        region: "{{ region }}"
        tags: { Name: "prassadh-public-subnet-1a" }
      register: subnet_public_1a

    - name: Private Subnet 1a
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.11.0/24"
        az: "ap-south-1a"
        region: "{{ region }}"
        tags: { Name: "prassadh-private-subnet-1a" }
      register: subnet_private_1a

    - name: Database Subnet 1a
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.21.0/24"
        az: "ap-south-1a"
        region: "{{ region }}"
        tags: { Name: "prassadh-database-subnet-1a" }
      register: subnet_db_1a

    # Subnets AZ 1b
    - name: Public Subnet 1b
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.2.0/24"
        az: "ap-south-1b"
        region: "{{ region }}"
        map_public: true
        tags: { Name: "prassadh-public-subnet-1b" }
      register: subnet_public_1b

    - name: Private Subnet 1b
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.12.0/24"
        az: "ap-south-1b"
        region: "{{ region }}"
        tags: { Name: "prassadh-private-subnet-1b" }
      register: subnet_private_1b

    - name: Database Subnet 1b
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.22.0/24"
        az: "ap-south-1b"
        region: "{{ region }}"
        tags: { Name: "prassadh-database-subnet-1b" }
      register: subnet_db_1b

    # IGW
    - name: Create Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        state: present
      register: igw

    # NAT Gateway (example in public-1a)
    - name: Create NAT Gateway
      amazon.aws.ec2_vpc_nat_gateway:
        subnet_id: "{{ subnet_public_1a.subnet.id }}"
        region: "{{ region }}"
        state: present
      register: natgw

    # Security Groups
    - name: Bastion SG
      amazon.aws.ec2_group:
        name: prassadh-bastion
        description: Bastion SG
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: 22
            cidr_ip: "YOUR_PUBLIC_IP/32"
        rules_egress:
          - proto: -1
            cidr_ip: "0.0.0.0/0"

    - name: Frontend SG
      amazon.aws.ec2_group:
        name: prassadh-frontend
        description: Frontend SG
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: [80, 443]
            cidr_ip: "0.0.0.0/0"
        rules_egress:
          - proto: -1
            cidr_ip: "0.0.0.0/0"

    - name: Backend SG
      amazon.aws.ec2_group:
        name: prassadh-backend
        description: Backend SG
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: 8080
            group_name: prassadh-frontend
          - proto: tcp
            ports: 22
            group_name: prassadh-bastion
        rules_egress:
          - proto: -1
            cidr_ip: "0.0.0.0/0"

    - name: Database SG
      amazon.aws.ec2_group:
        name: prassadh-database
        description: Database SG
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: 3306
            group_name: prassadh-backend
          - proto: tcp
            ports: 22
            group_name: prassadh-bastion
        rules_egress:
          - proto: -1
            cidr_ip: "0.0.0.0/0"
