- name: Create VPC, Subnets and Security Groups for gcp-vpc
  hosts: local
  connection: local
  collections:
    - amazon.aws

  vars:
    region: "ap-south-1"
    vpc_name: "gcp-vpc"
    cidr_block: "10.0.0.0/16"

  tasks:
    # VPC
    - name: Create VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ vpc_name }}"
        cidr_block: "{{ cidr_block }}"
        region: "{{ region }}"
        dns_support: true
        dns_hostnames: true
        state: present
      register: vpc

    # Subnets
    - name: Create Public Subnet 1a
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.1.0/24"
        az: "ap-south-1a"
        map_public: true
        state: present
        tags: { Name: "gcp-vpc-public-subnet-1a" }
      register: subnet_public_1a

    - name: Create Public Subnet 1b
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.2.0/24"
        az: "ap-south-1b"
        map_public: true
        state: present
        tags: { Name: "gcp-vpc-public-subnet-1b" }
      register: subnet_public_1b

    - name: Create Private Subnet 1a
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.11.0/24"
        az: "ap-south-1a"
        state: present
        tags: { Name: "gcp-vpc-private-subnet-1a" }
      register: subnet_private_1a

    - name: Create Database Subnet 1a
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.21.0/24"
        az: "ap-south-1a"
        state: present
        tags: { Name: "gcp-vpc-database-subnet-1a" }
      register: subnet_db_1a

    # Security Groups
    - name: Bastion SG
      amazon.aws.ec2_group:
        name: gcp-vpc-bastion
        description: Bastion SG
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: 22
            cidr_ip: "YOUR_PUBLIC_IP/32"
        rules_egress:
          - proto: -1
            cidr_ip: "0.0.0.0/0"

    - name: Frontend SG
      amazon.aws.ec2_group:
        name: gcp-vpc-frontend
        description: Frontend SG
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: [80, 443]
            cidr_ip: "0.0.0.0/0"
        rules_egress:
          - proto: -1
            cidr_ip: "0.0.0.0/0"

    - name: Backend SG
      amazon.aws.ec2_group:
        name: gcp-vpc-backend
        description: Backend SG
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: 8080
            group_name: gcp-vpc-frontend
          - proto: tcp
            ports: 22
            group_name: gcp-vpc-bastion
        rules_egress:
          - proto: -1
            cidr_ip: "0.0.0.0/0"

    - name: Database SG
      amazon.aws.ec2_group:
        name: gcp-vpc-database
        description: Database SG
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: 3306
            group_name: gcp-vpc-backend
          - proto: tcp
            ports: 22
            group_name: gcp-vpc-bastion
        rules_egress:
          - proto: -1
            cidr_ip: "0.0.0.0/0"


