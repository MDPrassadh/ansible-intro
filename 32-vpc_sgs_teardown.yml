- name: Teardown VPC, Subnets, IGW, NAT, and SGs
  hosts: local
  connection: local
  collections:
    - amazon.aws

  vars:
    region: "ap-south-1"
    vpc_name: "prassadh"

  tasks:
    # 1. Discover NAT Gateway
    - name: Get NAT Gateway info
      amazon.aws.ec2_vpc_nat_gateway_info:
        region: "{{ region }}"
        filters:
          "tag:Name": "prassadh-natgw"
      register: natgw_info

    - name: Delete NAT Gateway
      amazon.aws.ec2_vpc_nat_gateway:
        region: "{{ region }}"
        nat_gateway_id: "{{ natgw_info.nat_gateways[0].nat_gateway_id }}"
        state: absent
        wait: true
      when: natgw_info.nat_gateways is defined and natgw_info.nat_gateways|length > 0

    # 2. Discover Elastic IP
    - name: Get Elastic IP info
      amazon.aws.ec2_eip_info:
        region: "{{ region }}"
        filters:
          "tag:Name": "prassadh-nat-eip"
      register: eip_info

    - name: Release Elastic IP
      amazon.aws.ec2_eip:
        region: "{{ region }}"
        state: absent
        public_ip: "{{ eip_info.addresses[0].public_ip }}"
      when: eip_info.addresses is defined and eip_info.addresses|length > 0



    # 3. Discover and Delete Route Tables
    - name: Get Route Tables
      amazon.aws.ec2_vpc_route_table_info:
        region: "{{ region }}"
        filters:
          "tag:Name": ["prassadh-public-rt","prassadh-private-rt","prassadh-db-rt"]
      register: rt_info

    - name: Delete Route Tables
      amazon.aws.ec2_vpc_route_table:
        region: "{{ region }}"
        route_table_id: "{{ item.route_table_id }}"
        state: absent
      loop: "{{ rt_info.route_tables | default([]) }}"
      when: rt_info.route_tables is defined and rt_info.route_tables|length > 0

    # 4. Discover and Delete Security Groups
    - name: Get Security Groups
      amazon.aws.ec2_group_info:
        region: "{{ region }}"
        filters:
          group-name: ["prassadh-bastion","prassadh-frontend","prassadh-backend","prassadh-database"]
      register: sg_info

    - name: Delete Security Groups
      amazon.aws.ec2_group:
        region: "{{ region }}"
        group_id: "{{ item.group_id }}"
        state: absent
      loop: "{{ sg_info.security_groups | default([]) }}"
      when: sg_info.security_groups is defined and sg_info.security_groups|length > 0

    # 5. Discover and Delete Subnets
    - name: Get Subnets
      amazon.aws.ec2_vpc_subnet_info:
        region: "{{ region }}"
        filters:
          "tag:Name": [
            "prassadh-public-subnet-1a","prassadh-public-subnet-1b",
            "prassadh-private-subnet-1a","prassadh-private-subnet-1b",
            "prassadh-database-subnet-1a","prassadh-database-subnet-1b"
          ]
      register: subnet_info

    - name: Delete Subnets
      amazon.aws.ec2_vpc_subnet:
        region: "{{ region }}"
        subnet_id: "{{ item.subnet_id }}"
        state: absent
      loop: "{{ subnet_info.subnets | default([]) }}"
      when: subnet_info.subnets is defined and subnet_info.subnets|length > 0

    # 6. Discover and Delete IGW
    - name: Get VPC info
      amazon.aws.ec2_vpc_net_info:
        region: "{{ region }}"
        filters:
          "tag:Name": "{{ vpc_name }}"
      register: vpc_info

    - name: Get Internet Gateway
      amazon.aws.ec2_vpc_igw_info:
        region: "{{ region }}"
        filters:
          "attachment.vpc-id": "{{ vpc_info.vpcs[0].vpc_id | default(omit) }}"
      register: igw_info
      when: vpc_info.vpcs is defined and vpc_info.vpcs|length > 0

    - name: Delete Internet Gateway
      amazon.aws.ec2_vpc_igw:
        region: "{{ region }}"
        internet_gateway_id: "{{ igw_info.internet_gateways[0].internet_gateway_id }}"
        state: absent
      when: igw_info.internet_gateways is defined and igw_info.internet_gateways|length > 0

    # 7. Delete VPC
    - name: Delete VPC
      amazon.aws.ec2_vpc_net:
        region: "{{ region }}"
        vpc_id: "{{ vpc_info.vpcs[0].vpc_id }}"
        state: absent
      when: vpc_info.vpcs is defined and vpc_info.vpcs|length > 0













