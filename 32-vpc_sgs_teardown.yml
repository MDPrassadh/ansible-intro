- name: Teardown VPC, Subnets, IGW, NAT, and SGs
  hosts: local
  connection: local
  collections:
    - amazon.aws

  vars:
    region: "ap-south-1"
    vpc_name: "prassadh"

  tasks:
    # Lookup VPC
    - name: Get VPC info
      amazon.aws.ec2_vpc_net_info:
        filters:
          "tag:Name": "{{ vpc_name }}"
        region: "{{ region }}"
      register: vpc_info

    - name: Set VPC ID fact
      set_fact:
        vpc_id: "{{ vpc_info.vpcs[0].vpc_id | default('') }}"

    # Delete SGs
    - name: Delete SGs
      amazon.aws.ec2_group:
        name: "{{ item }}"
        region: "{{ region }}"
        vpc_id: "{{ vpc_id }}"
        state: absent
      loop:
        - prassadh-database
        - prassadh-backend
        - prassadh-frontend
        - prassadh-bastion
      ignore_errors: true

    # Delete Route Tables
    - name: Delete Route Tables
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc_id }}"
        region: "{{ region }}"
        state: absent
        tags:
          Name: "{{ item }}"
      loop:
        - prassadh-db-rt
        - prassadh-private-rt
        - prassadh-public-rt
      ignore_errors: true

    # Delete NAT Gateways
    - name: Get NAT Gateway info
      amazon.aws.ec2_vpc_nat_gateway_info:
        filters:
          vpc-id: "{{ vpc_id }}"
        region: "{{ region }}"
      register: natgw_info

    - name: Delete NAT Gateways
      amazon.aws.ec2_vpc_nat_gateway:
        nat_gateway_id: "{{ item.nat_gateway_id }}"
        region: "{{ region }}"
        state: absent
        wait: true
      loop: "{{ natgw_info.result | default([]) }}"
      ignore_errors: true

    # Delete IGW
    - name: Delete Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc_id }}"
        region: "{{ region }}"
        state: absent
      ignore_errors: true

    # Lookup Subnets
    - name: Get Subnet info
      amazon.aws.ec2_vpc_subnet_info:
        filters:
          vpc-id: "{{ vpc_id }}"
        region: "{{ region }}"
      register: subnet_info

    - name: Delete Subnets
      amazon.aws.ec2_vpc_subnet:
        subnet_id: "{{ item.subnet_id }}"
        region: "{{ region }}"
        state: absent
      loop: "{{ subnet_info.subnets | default([]) }}"
      ignore_errors: true

    # Finally delete VPC
    - name: Delete VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ vpc_name }}"
        region: "{{ region }}"
        state: absent
      ignore_errors: true
