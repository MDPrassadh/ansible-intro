- name: Teardown VPC, Subnets, IGW, NAT, and SGs
  hosts: local
  connection: local
  collections:
    - amazon.aws

  vars:
    region: "ap-south-1"
    vpc_name: "prassadh"

  tasks:
    # Delete Database SG
    - name: Delete Database SG
      amazon.aws.ec2_group:
        name: prassadh-database
        region: "{{ region }}"
        state: absent

    # Delete Backend SG
    - name: Delete Backend SG
      amazon.aws.ec2_group:
        name: prassadh-backend
        region: "{{ region }}"
        state: absent

    # Delete Frontend SG
    - name: Delete Frontend SG
      amazon.aws.ec2_group:
        name: prassadh-frontend
        region: "{{ region }}"
        state: absent

    # Delete Bastion SG
    - name: Delete Bastion SG
      amazon.aws.ec2_group:
        name: prassadh-bastion
        region: "{{ region }}"
        state: absent

    # Delete Database Route Table
    - name: Delete Database Route Table
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        route_table_id: "{{ db_rt.route_table.id }}"
        state: absent

    # Delete Private Route Table
    - name: Delete Private Route Table
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        route_table_id: "{{ private_rt.route_table.id }}"
        state: absent

    # Delete Public Route Table
    - name: Delete Public Route Table
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        route_table_id: "{{ public_rt.route_table.id }}"
        state: absent

    # Delete NAT Gateway
    - name: Delete NAT Gateway
      amazon.aws.ec2_vpc_nat_gateway:
        nat_gateway_id: "{{ natgw.nat_gateway_id }}"
        region: "{{ region }}"
        state: absent
        wait: true

    # Release Elastic IP
    - name: Release Elastic IP
      amazon.aws.ec2_eip:
        allocation_id: "{{ nat_eip.allocation_id }}"
        region: "{{ region }}"
        state: absent

    # Delete Internet Gateway
    - name: Delete Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        state: absent

    # Delete Subnets
    - name: Delete Public Subnet 1a
      amazon.aws.ec2_vpc_subnet:
        subnet_id: "{{ subnet_public_1a.subnet.id }}"
        region: "{{ region }}"
        state: absent

    - name: Delete Public Subnet 1b
      amazon.aws.ec2_vpc_subnet:
        subnet_id: "{{ subnet_public_1b.subnet.id }}"
        region: "{{ region }}"
        state: absent

    - name: Delete Private Subnet 1a
      amazon.aws.ec2_vpc_subnet:
        subnet_id: "{{ subnet_private_1a.subnet.id }}"
        region: "{{ region }}"
        state: absent

    - name: Delete Private Subnet 1b
      amazon.aws.ec2_vpc_subnet:
        subnet_id: "{{ subnet_private_1b.subnet.id }}"
        region: "{{ region }}"
        state: absent

    - name: Delete Database Subnet 1a
      amazon.aws.ec2_vpc_subnet:
        subnet_id: "{{ subnet_db_1a.subnet.id }}"
        region: "{{ region }}"
        state: absent

    - name: Delete Database Subnet 1b
      amazon.aws.ec2_vpc_subnet:
        subnet_id: "{{ subnet_db_1b.subnet.id }}"
        region: "{{ region }}"
        state: absent

    # Finally delete VPC
    - name: Delete VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ vpc_name }}"
        region: "{{ region }}"
        state: absent
