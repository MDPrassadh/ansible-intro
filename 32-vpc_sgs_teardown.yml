- name: Teardown VPC, Subnets, IGW, NAT, and SGs
  hosts: local
  connection: local
  collections:
    - amazon.aws

  vars:
    region: "ap-south-1"
    vpc_name: "prassadh"

  tasks:
    # 1. Delete NAT Gateway
    - name: Delete NAT Gateway
      amazon.aws.ec2_vpc_nat_gateway:
        region: "{{ region }}"
        nat_gateway_id: "{{ natgw.nat_gateway_id | default(omit) }}"
        state: absent
        wait: true

    # 2. Release Elastic IP
    - name: Release Elastic IP
      amazon.aws.ec2_eip:
        region: "{{ region }}"
        state: absent
        tags:
          Name: "prassadh-nat-eip"

    # 3. Delete Route Tables
    - name: Delete Private Route Table
      amazon.aws.ec2_vpc_route_table:
        region: "{{ region }}"
        route_table_id: "{{ private_rt.route_table.id | default(omit) }}"
        state: absent

    - name: Delete Public Route Table
      amazon.aws.ec2_vpc_route_table:
        region: "{{ region }}"
        route_table_id: "{{ public_rt.route_table.id | default(omit) }}"
        state: absent

    - name: Delete Database Route Table
      amazon.aws.ec2_vpc_route_table:
        region: "{{ region }}"
        route_table_id: "{{ db_rt.route_table.id | default(omit) }}"
        state: absent

    # 4. Delete Security Groups
    - name: Delete Bastion SG
      amazon.aws.ec2_group:
        name: prassadh-bastion
        region: "{{ region }}"
        vpc_id: "{{ vpc.vpc.id }}"
        state: absent

    - name: Delete Frontend SG
      amazon.aws.ec2_group:
        name: prassadh-frontend
        region: "{{ region }}"
        vpc_id: "{{ vpc.vpc.id }}"
        state: absent

    - name: Delete Backend SG
      amazon.aws.ec2_group:
        name: prassadh-backend
        region: "{{ region }}"
        vpc_id: "{{ vpc.vpc.id }}"
        state: absent

    - name: Delete Database SG
      amazon.aws.ec2_group:
        name: prassadh-database
        region: "{{ region }}"
        vpc_id: "{{ vpc.vpc.id }}"
        state: absent

    # 5. Delete Subnets
    - name: Delete Subnets
      amazon.aws.ec2_vpc_subnet:
        region: "{{ region }}"
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ item }}"
        state: absent
      loop:
        - "10.0.1.0/24"
        - "10.0.2.0/24"
        - "10.0.11.0/24"
        - "10.0.12.0/24"
        - "10.0.21.0/24"
        - "10.0.22.0/24"

    # 6. Delete IGW
    - name: Delete Internet Gateway
      amazon.aws.ec2_vpc_igw:
        region: "{{ region }}"
        vpc_id: "{{ vpc.vpc.id }}"
        state: absent

    # 7. Delete VPC
    - name: Delete VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ vpc_name }}"
        region: "{{ region }}"
        state: absent
