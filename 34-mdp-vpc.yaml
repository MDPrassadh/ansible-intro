- name: Create VPC, Subnets, IGW, NAT, and SGs (MDP)
  hosts: local
  connection: local
  collections:
    - amazon.aws

  vars:
    region: "us-east-1"
    vpc_name: "mdp-vpc"
    cidr_block: "10.0.0.0/16"

  tasks:
    # VPC
    - name: Create VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ vpc_name }}"
        cidr_block: "{{ cidr_block }}"
        region: "{{ region }}"
        dns_support: true
        dns_hostnames: true
        state: present
      register: vpc

    # Subnets (Public, Private, DB in AZ1 + AZ2)
    - name: Public Subnet 1a
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.1.0/24"
        az: "us-east-1a"
        map_public: true
        region: "{{ region }}"
        tags: { Name: "mdp-public-subnet-1a" }
      register: subnet_public_1a

    - name: Public Subnet 1b
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.2.0/24"
        az: "us-east-1b"
        map_public: true
        region: "{{ region }}"
        tags: { Name: "mdp-public-subnet-1b" }
      register: subnet_public_1b

    - name: Private Subnet 1a
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.11.0/24"
        az: "us-east-1a"
        region: "{{ region }}"
        tags: { Name: "mdp-private-subnet-1a" }
      register: subnet_private_1a

    - name: Private Subnet 1b
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.12.0/24"
        az: "us-east-1b"
        region: "{{ region }}"
        tags: { Name: "mdp-private-subnet-1b" }
      register: subnet_private_1b

    - name: Database Subnet 1a
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.21.0/24"
        az: "us-east-1a"
        region: "{{ region }}"
        tags: { Name: "mdp-database-subnet-1a" }
      register: subnet_db_1a

    - name: Database Subnet 1b
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.22.0/24"
        az: "us-east-1b"
        region: "{{ region }}"
        tags: { Name: "mdp-database-subnet-1b" }
      register: subnet_db_1b

    # IGW + NAT
    - name: Create Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        state: present
      register: igw

    - name: Allocate Elastic IP for NAT
      amazon.aws.ec2_eip:
        region: "{{ region }}"
        state: present
        tags: { Name: "mdp-nat-eip" }
      register: nat_eip

    - name: Create NAT Gateway
      amazon.aws.ec2_vpc_nat_gateway:
        subnet_id: "{{ subnet_public_1a.subnet.id }}"
        region: "{{ region }}"
        allocation_id: "{{ nat_eip.allocation_id }}"
        state: present
        wait: true
      register: natgw

    # Route Tables
    - name: Public RT
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        state: present
        tags: { Name: "mdp-public-rt" }
        routes:
          - dest: "0.0.0.0/0"
            gateway_id: "{{ igw.gateway_id }}"
        subnets:
          - "{{ subnet_public_1a.subnet.id }}"
          - "{{ subnet_public_1b.subnet.id }}"

    - name: Private RT
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        state: present
        tags: { Name: "mdp-private-rt" }
        routes:
          - dest: "0.0.0.0/0"
            nat_gateway_id: "{{ natgw.nat_gateway_id }}"
        subnets:
          - "{{ subnet_private_1a.subnet.id }}"
          - "{{ subnet_private_1b.subnet.id }}"

    - name: Database RT
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        state: present
        tags: { Name: "mdp-db-rt" }
        subnets:
          - "{{ subnet_db_1a.subnet.id }}"
          - "{{ subnet_db_1b.subnet.id }}"

    # Security Groups
    - name: Bastion SG
      amazon.aws.ec2_group:
        name: mdp-bastion
        description: Bastion SG
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: 22
            cidr_ip: 0.0.0.0/0
        rules_egress:
          - proto: -1
            cidr_ip: "0.0.0.0/0"

    - name: Workspace SG
      amazon.aws.ec2_group:
        name: mdp-workspace
        description: Workspace SG
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: 22
            group_name: mdp-bastion
        rules_egress:
          - proto: -1
            cidr_ip: "0.0.0.0/0"

    - name: Frontend SG
      amazon.aws.ec2_group:
        name: mdp-frontend
        description: Frontend SG
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: [80, 443]
            cidr_ip: "0.0.0.0/0"
          - proto: tcp
            ports: 22
            group_name: mdp-bastion
        rules_egress:
          - proto: -1
            cidr_ip: "0.0.0.0/0"

    - name: Backend SG
      amazon.aws.ec2_group:
        name: mdp-backend
        description: Backend SG
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: 8080
            group_name: mdp-frontend
          - proto: tcp
            ports: 22
            group_name: mdp-bastion
        rules_egress:
          - proto: tcp
            ports: 3306
            group_name: mdp-mysql
          - proto: -1
            cidr_ip: "0.0.0.0/0"

    - name: MySQL SG
      amazon.aws.ec2_group:
        name: mdp-mysql
        description: MySQL SG
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: 3306
            group_name: mdp-backend
          - proto: tcp
            ports: 22
            group_name: mdp-bastion
        rules_egress:
          - proto: -1
            cidr_ip: "0.0.0.0/0"
