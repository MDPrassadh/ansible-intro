[local]
localhost ansible_connection=local

[bastion]
bastion.jioairlines.online ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/nv-ansible.pem

[mysql]
mysql.jioairlines.online ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/nv-ansible.pem
ansible_ssh_common_args='-o ProxyCommand="ssh -i ~/.ssh/nv-ansible.pem -W %h:%p ec2-user@bastion.jioairlines.online"'

[backend]
backend.jioairlines.online ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/nv-ansible.pem
ansible_ssh_common_args='-o ProxyCommand="ssh -i ~/.ssh/nv-ansible.pem -W %h:%p ec2-user@bastion.jioairlines.online"'

[frontend]
frontend.jioairlines.online ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/nv-ansible.pem




